name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build site
        id: build
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package.json ]; then
            npm ci
            npm run build

            if [ -d dist ]; then
              echo "publish_dir=dist" >> "$GITHUB_OUTPUT"
            elif [ -d build ]; then
              echo "publish_dir=build" >> "$GITHUB_OUTPUT"
            else
              echo "No dist/ or build/ directory found after npm run build" >&2
              exit 1
            fi
          else
            echo "publish_dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.build.outputs.publish_dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
